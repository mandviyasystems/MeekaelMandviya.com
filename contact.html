<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact - Mandviya Systems</title>

  <link rel="icon" href="favicon.png" type="image/png" />
  <link rel="stylesheet" href="styles.css" />

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

  <!-- AOS Animation -->
  <link href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css" rel="stylesheet" />
</head>

<body>

<!-- NAVBAR -->
<header>
  <nav class="navbar">
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="services.html">Services</a></li>
      <li><a href="portfolio.html">Portfolio</a></li>
      <li><a href="pricing.html">Pricing</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
  </nav>
</header>

<!-- CONTACT -->
<main>
<section id="contact" data-aos="fade-up">

  <h1 class="section-title">Contact Me</h1>

  <p id="form-status"></p>

  <form
    id="contact-form"
    action="https://formspree.io/f/xkokznql"
    method="POST"
    data-aos="fade-up"
    data-aos-delay="100"
  >

    <input
      type="text"
      name="name"
      placeholder="Your Name"
      required
    />

    <input
      type="email"
      name="email"
      placeholder="Your Email"
      required
    />

    <input
      type="text"
      name="company"
      placeholder="Company Name (Optional)"
    />

    <select name="service" required>
      <option value="">What do you need help with?</option>
      <option>Website Development</option>
      <option>Cloud Infrastructure / AWS</option>
      <option>System Migration</option>
      <option>Support / Maintenance</option>
      <option>Technical Consulting</option>
      <option>Custom Solution</option>
      <option>Not Sure Yet</option>
    </select>

    <select name="timeline" required>
      <option value="">Desired Timeline</option>
      <option>ASAP</option>
      <option>This Month</option>
      <option>1 - 3 Months</option>
      <option>Just Exploring</option>
    </select>

    <textarea
      name="message"
      placeholder="Describe your project, issue, or goal..."
      required
    ></textarea>

    <button type="submit" id="submit-btn">
      Send Message
    </button>

  </form>

  <!-- SOCIAL -->
  <div class="social-links" data-aos="fade-up" data-aos-delay="300">
    <h3>Connect With Mandviya Systems</h3>

    <a
      href="https://www.linkedin.com/in/meekael-mandviya-452090297/"
      target="_blank"
      rel="noopener noreferrer"
    >
      <i class="fab fa-linkedin"></i> LinkedIn
    </a>

    <a
      href="https://www.instagram.com/meekael_mandviya"
      target="_blank"
      rel="noopener noreferrer"
    >
      <i class="fab fa-instagram"></i> Instagram
    </a>
  </div>

</section>
</main>

<!-- AOS -->
<script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>

<script>
document.addEventListener("DOMContentLoaded", function () {
  AOS.init({
    duration: 800,
    once: true
  });
});

/* FORM SUBMIT */
const form = document.getElementById("contact-form");
const status = document.getElementById("form-status");
const button = document.getElementById("submit-btn");

form.addEventListener("submit", async function(event) {
  event.preventDefault();

  button.disabled = true;
  button.textContent = "Sending...";
  status.textContent = "";

  const data = new FormData(form);

  try {
    const response = await fetch(form.action, {
      method: "POST",
      body: data,
      headers: {
        Accept: "application/json"
      }
    });

    if (response.ok) {
      status.textContent = "Thanks! Your message has been sent.";
      form.reset();
    } else {
      status.textContent = "Something went wrong. Please try again.";
    }

  } catch (error) {
    status.textContent = "Network error. Please try again.";
  }

  button.disabled = false;
  button.textContent = "Send Message";
});
</script>

</body>
</html>
