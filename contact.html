<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact - Mandviya Systems</title>

  <link rel="icon" href="favicon.png" type="image/png" />
  <link rel="stylesheet" href="styles.css" />

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css" rel="stylesheet" />
</head>

<body>

<header>
  <nav class="navbar">
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="services.html">Services</a></li>
      <li><a href="portfolio.html">Portfolio</a></li>
      <li><a href="pricing.html">Pricing</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
  </nav>
</header>

<main>
<section id="contact" data-aos="fade-up">

  <h1 class="section-title">Contact</h1>

  <p>
    Have a project in mind? Send a message below or book a discovery call to speak directly.
  </p>

  <!-- PRIMARY CTA -->
  <a href="YOUR_BOOKING_LINK_HERE" class="cta-button" target="_blank">
    Book a Discovery Call
  </a>

  <p style="margin: 15px 0;">
    Prefer to send details first? Fill out the form below.
  </p>

  <p id="form-status"></p>

  <form id="contact-form" action="https://formspree.io/f/xkokznql" method="POST">

    <input type="text" name="name" placeholder="Your Name" required />
    <input type="email" name="email" placeholder="Your Email" required />

    <input type="text" name="company" placeholder="Company Name (Optional)" />
    <input type="url" name="website" placeholder="Company Website (Optional)" />

    <!-- SERVICE TYPE -->
    <select name="service" required>
      <option value="">What do you need help with?</option>
      <option>Website Creation</option>
      <option>Website Deployment</option>
      <option>Cloud Migration</option>
      <option>Post-Migration Support</option>
      <option>Not Sure Yet</option>
    </select>

    <!-- TIMELINE -->
    <select name="timeline" id="timeline" required>
      <option value="">Desired Timeline</option>
      <option>ASAP</option>
      <option>This Week</option>
      <option>This Month</option>
      <option>1–3 Months</option>
      <option>Flexible</option>
      <option value="custom">Custom Timeline</option>
      <option>Just Exploring</option>
    </select>

    <!-- CUSTOM TIMELINE -->
    <input
      type="text"
      name="custom_timeline"
      id="custom_timeline"
      placeholder="Enter your custom timeline..."
      style="display:none;"
    />

    <!-- MESSAGE -->
    <textarea
      name="message"
      placeholder="Describe your project, issue, or goal..."
      required
    ></textarea>

    <!-- FILE UPLOAD -->
    <label class="file-label">Attach Screenshots / Files (optional)</label>
    <input
      type="file"
      name="files"
      multiple
      accept="image/*,.pdf,.png,.jpg,.jpeg"
    />

    <button type="submit" id="submit-btn">Send Message</button>

  </form>

  <div class="social-links">
    <h3>Connect with Meekael Mandviya</h3>

    <a href="https://www.linkedin.com/in/meekael-mandviya" target="_blank">
      <i class="fab fa-linkedin"></i> LinkedIn
    </a>

    <a href="https://www.instagram.com/meekael_mandviya" target="_blank">
      <i class="fab fa-instagram"></i> Instagram
    </a>
  </div>

</section>
</main>

<script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>

<script>
AOS.init({ duration: 800, once: true });

document.getElementById("timeline").addEventListener("change", function () {
  const custom = document.getElementById("custom_timeline");

  if (this.value === "custom") {
    custom.style.display = "block";
    custom.required = true;
  } else {
    custom.style.display = "none";
    custom.required = false;
    custom.value = "";
  }
});

const form = document.getElementById("contact-form");
const status = document.getElementById("form-status");
const button = document.getElementById("submit-btn");

form.addEventListener("submit", async (e) => {
  e.preventDefault();

  button.disabled = true;
  button.textContent = "Sending...";
  status.textContent = "";

  try {
    const res = await fetch(form.action, {
      method: "POST",
      body: new FormData(form),
      headers: { Accept: "application/json" }
    });

    if (res.ok) {
      status.textContent = "Message sent successfully.";
      form.reset();
      document.getElementById("custom_timeline").style.display = "none";
    } else {
      status.textContent = "Something went wrong. Try again.";
    }

  } catch {
    status.textContent = "Network error. Try again.";
  }

  button.disabled = false;
  button.textContent = "Send Message";
});
</script>

</body>
</html>
